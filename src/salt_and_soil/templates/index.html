<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Salt &amp; Soil</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,400&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --teal:        #1ABFBA;
  --teal-dark:   #139E9A;
  --teal-light:  #E8F8F8;
  --teal-mid:    #A8E8E7;
  --bg:          #F4F6F8;
  --surface:     #FFFFFF;
  --border:      #E2E7EE;
  --border-mid:  #C8D0DB;
  --text:        #18222E;
  --text-mid:    #475467;
  --text-dim:    #8898AA;
  --amber:       #F59E0B;
  --amber-bg:    #FFFBEB;
  --red:         #EF4444;
  --red-bg:      #FFF2F2;
  --green:       #10B981;
  --green-bg:    #EDFCF5;
  --blue:        #3B82F6;
  --blue-bg:     #EFF6FF;
  --sans:        'DM Sans', sans-serif;
  --mono:        'DM Mono', monospace;
  --r:           10px;
  --shadow:      0 1px 4px rgba(0,0,0,.06), 0 2px 12px rgba(0,0,0,.04);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg); color: var(--text); font-family: var(--sans); font-size: 14px; min-height: 100vh; }

/* ── Header ── */
header {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 0 24px;
  height: 58px;
  display: flex; align-items: center; justify-content: space-between;
  position: sticky; top: 0; z-index: 30;
  box-shadow: 0 1px 3px rgba(0,0,0,.05);
}
.logo { display: flex; align-items: center; gap: 10px; }
.logo-mark {
  width: 34px; height: 34px;
  background: var(--teal);
  border-radius: 9px;
  display: flex; align-items: center; justify-content: center;
  font-weight: 700; font-size: 13px; color: #fff; letter-spacing: -.5px;
}
.logo-text { font-weight: 600; font-size: 16px; letter-spacing: -.3px; }
.logo-node { font-size: 11px; color: var(--text-dim); margin-top: 1px; }

.status-chip {
  display: flex; align-items: center; gap: 6px;
  padding: 5px 12px; border-radius: 20px;
  font-size: 12px; font-weight: 500;
}
.chip-dot { width: 6px; height: 6px; border-radius: 50%; }
.chip-idle    { background: #F0F2F5; color: var(--text-dim); }
.chip-idle    .chip-dot { background: var(--text-dim); }
.chip-mounting,.chip-scanning { background: var(--blue-bg); color: var(--blue); }
.chip-mounting .chip-dot,.chip-scanning .chip-dot { background: var(--blue); animation: blink 1s infinite; }
.chip-ready   { background: var(--teal-light); color: var(--teal-dark); }
.chip-ready   .chip-dot { background: var(--teal); }
.chip-syncing { background: var(--amber-bg); color: #92400E; }
.chip-syncing .chip-dot { background: var(--amber); animation: blink 1s infinite; }
.chip-done    { background: var(--green-bg); color: #065F46; }
.chip-done    .chip-dot { background: var(--green); }
.chip-error   { background: var(--red-bg); color: var(--red); }
.chip-error   .chip-dot { background: var(--red); }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:.25} }

.schedule-chip {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 5px 12px; border-radius: 20px;
  font-size: 12px; font-weight: 500;
  background: var(--blue-bg); color: var(--blue);
}
/* Schedule form */
.sched-form { padding: 18px; display: flex; flex-direction: column; gap: 18px; }
.sched-row { display: flex; flex-direction: column; gap: 8px; }
.sched-label { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: .7px; color: var(--text-dim); }
.sched-radio { display: flex; align-items: center; gap: 8px; cursor: pointer; font-size: 13px; }
.sched-radio input { accent-color: var(--teal); }
.sched-days { display: flex; flex-wrap: wrap; gap: 8px; }
.sched-day-btn {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 6px 12px; border: 1px solid var(--border-mid); border-radius: 20px;
  cursor: pointer; font-size: 12px; color: var(--text-mid);
  user-select: none; transition: all .12s;
}
.sched-day-btn input { display: none; }
.sched-day-btn.active { background: var(--teal-light); border-color: var(--teal); color: var(--teal-dark); }
.sched-time {
  font-family: var(--sans); font-size: 14px; font-weight: 500;
  padding: 8px 12px; border: 1px solid var(--border-mid); border-radius: 8px;
  width: 120px;
}
.sched-time:focus { outline: none; border-color: var(--teal); }
.sched-form.disabled .sched-days,
.sched-form.disabled .sched-presets,
.sched-form.disabled .sched-time-row { opacity: .35; pointer-events: none; }
.sched-presets { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 2px; }
.sched-preset-btn {
  font-family: var(--sans); font-size: 12px; font-weight: 400;
  padding: 6px 12px; border-radius: 20px;
  background: transparent; border: 1px solid var(--border-mid); color: var(--text-mid);
  cursor: pointer; transition: all .12s; user-select: none;
}
.sched-preset-btn:hover { border-color: var(--teal); color: var(--teal); }
.sched-preset-btn.active { background: var(--teal-light); border-color: var(--teal); color: var(--teal-dark); }

/* ── Layout ── */
main { max-width: 980px; margin: 0 auto; padding: 24px 20px; }

/* ── Cards ── */
.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r);
  box-shadow: var(--shadow);
  margin-bottom: 16px;
}
.card-head {
  padding: 12px 18px;
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
}
.card-title {
  font-size: 11px; font-weight: 600;
  text-transform: uppercase; letter-spacing: .8px;
  color: var(--text-dim);
}

/* ── Buttons ── */
.btn {
  display: inline-flex; align-items: center; gap: 6px;
  font-family: var(--sans); font-size: 13px; font-weight: 500;
  padding: 9px 18px; border-radius: 8px; border: none;
  cursor: pointer; transition: all .15s; white-space: nowrap; line-height: 1;
}
.btn:active { transform: scale(.97); }
.btn:disabled { opacity: .35; cursor: not-allowed; transform: none; }

.btn-primary  { background: var(--teal); color: #fff; }
.btn-primary:hover:not(:disabled) { background: var(--teal-dark); }
.btn-outline  { background: transparent; border: 1px solid var(--border-mid); color: var(--text-mid); }
.btn-outline:hover:not(:disabled) { border-color: var(--teal); color: var(--teal); background: var(--teal-light); }
.btn-execute  { background: var(--teal); color: #fff; font-size: 14px; font-weight: 600; padding: 11px 26px; }
.btn-execute:hover:not(:disabled) { background: var(--teal-dark); }
.btn-cancel   { background: var(--red); color: #fff; font-size: 14px; font-weight: 600; padding: 11px 26px; }
.btn-cancel:hover:not(:disabled) { filter: brightness(0.92); }
.cancel-confirm {
  display: none; align-items: center; justify-content: space-between;
  gap: 14px; padding: 12px 16px; margin-bottom: 10px;
  background: var(--red-bg); color: var(--red);
  border: 1px solid #FECACA; border-radius: var(--r);
  font-size: 14px;
}
.cancel-confirm.visible { display: flex; flex-wrap: wrap; }
.cancel-confirm .msg { flex: 1; color: #92400E; font-weight: 500; }
.cancel-confirm .actions { display: flex; gap: 8px; }
.cancel-confirm .btn-sm { padding: 6px 14px; font-size: 13px; font-weight: 600; border-radius: 6px; cursor: pointer; border: 1px solid transparent; }
.cancel-confirm .btn-yes { background: var(--red); color: #fff; }
.cancel-confirm .btn-yes:hover { filter: brightness(0.92); }
.cancel-confirm .btn-no  { background: #fff; color: var(--text-mid); border-color: var(--border-mid); }
.cancel-confirm .btn-no:hover { border-color: var(--teal); color: var(--teal); }

/* ── Action row ── */
.action-row { display: flex; gap: 8px; margin-bottom: 12px; flex-wrap: wrap; }

/* ── Progress bar ── */
.progress-wrap {
  height: 4px; background: var(--border); border-radius: 2px;
  margin-bottom: 20px; overflow: hidden; display: none;
}
.progress-wrap.visible { display: block; }
.progress-inner {
  height: 100%; width: 35%; background: var(--teal); border-radius: 2px;
  animation: prog 1.4s ease-in-out infinite;
}
@keyframes prog { 0%{transform:translateX(-100%)} 100%{transform:translateX(380%)} }

/* ── Tabs ── */
.tab-bar {
  display: flex; gap: 2px;
  border-bottom: 1px solid var(--border);
  margin-bottom: 16px;
}
.tab-btn {
  font-family: var(--sans); font-size: 13px; font-weight: 500;
  padding: 9px 18px; border: none; background: transparent;
  color: var(--text-dim); cursor: pointer;
  border-bottom: 2px solid transparent; margin-bottom: -1px;
  transition: color .15s, border-color .15s;
}
.tab-btn:hover { color: var(--text); }
.tab-btn.active { color: var(--teal-dark); border-bottom-color: var(--teal); }
.tab-panel { display: none; }
.tab-panel.active { display: block; }

/* ── Table ── */
.folder-table { width: 100%; border-collapse: collapse; }
.folder-table.cols-hidden th:not(:first-child) { display: none; }
.folder-table thead th {
  text-align: left; font-size: 11px; font-weight: 600;
  text-transform: uppercase; letter-spacing: .7px;
  color: var(--text-dim); padding: 10px 16px;
  background: var(--bg); border-bottom: 1px solid var(--border);
}
.folder-table tbody td { padding: 11px 16px; border-bottom: 1px solid var(--border); vertical-align: middle; }
.folder-table tbody tr:last-child td { border-bottom: none; }
.folder-table tbody tr:hover td { background: #FAFBFC; }

.root-row td {
  background: var(--teal-light) !important;
  color: var(--teal-dark);
  font-size: 11px; font-weight: 600;
  text-transform: uppercase; letter-spacing: .7px;
  padding: 7px 16px;
  border-bottom: 1px solid var(--teal-mid);
  cursor: pointer;
  user-select: none;
}
.root-row:hover td { background: #d4f0f0 !important; }
.root-icon { margin-right: 6px; font-style: normal; font-size: 10px; }

.fname { font-family: var(--mono); font-size: 13px; font-weight: 500; }
.fsize { font-family: var(--mono); font-size: 12px; color: var(--text-mid); }
.fsize-diff { color: var(--amber); font-weight: 500; }

/* Badges */
.badge {
  display: inline-flex; align-items: center;
  font-size: 11px; font-weight: 600;
  padding: 2px 8px; border-radius: 4px; white-space: nowrap;
}
.badge-in_sync     { background: var(--green-bg);  color: #047857; }
.badge-needs_sync  { background: var(--amber-bg);  color: #92400E; }
.badge-local_only  { background: var(--blue-bg);   color: #1D4ED8; }
.badge-remote_only { background: var(--red-bg);    color: #B91C1C; }
.badge-unknown     { background: #F0F2F5;           color: var(--text-dim); }

/* Action select */
.action-select {
  font-family: var(--sans); font-size: 12px; font-weight: 500;
  background: var(--bg); border: 1px solid var(--border-mid);
  color: var(--text); padding: 6px 10px; border-radius: 6px;
  cursor: pointer; min-width: 90px; transition: border-color .15s;
}
.action-select:focus { outline: none; border-color: var(--teal); box-shadow: 0 0 0 3px rgba(26,191,186,.12); }
.sel-sync   { border-color: var(--teal);  background: var(--teal-light);  color: var(--teal-dark); }
.sel-pull   { border-color: var(--amber); background: var(--amber-bg);    color: #92400E; }
.sel-delete { border-color: var(--red);   background: var(--red-bg);      color: var(--red); }
.sel-skip   { color: var(--text-dim); }

/* Execute footer */
.exec-footer {
  display: flex; align-items: center; justify-content: space-between;
  gap: 14px; padding: 14px 18px;
  border: 1px solid var(--border); border-radius: var(--r);
  background: var(--surface); box-shadow: var(--shadow);
  flex-wrap: wrap;
}
.exec-stats { display: flex; gap: 18px; flex-wrap: wrap; }
.exec-stat { display: flex; align-items: baseline; gap: 5px; font-size: 12px; color: var(--text-mid); }
.exec-stat .n { font-family: var(--mono); font-size: 15px; font-weight: 600; }
.n-sync { color: var(--teal); }
.n-pull { color: var(--amber); }
.n-del  { color: var(--red); }
.n-skip { color: var(--text-dim); }

/* Log */
.log-box {
  font-family: var(--mono); font-size: 12px; line-height: 1.85;
  padding: 14px 16px; max-height: 420px; overflow-y: auto;
  background: var(--bg); border-radius: 0 0 var(--r) var(--r);
  color: var(--text-mid);
}
.log-box::-webkit-scrollbar { width: 4px; }
.log-box::-webkit-scrollbar-thumb { background: var(--border-mid); border-radius: 2px; }

/* Banners */
.banner {
  display: flex; align-items: center; gap: 8px;
  padding: 12px 16px; border-radius: var(--r);
  font-size: 14px; font-weight: 500; margin-bottom: 14px;
}
.banner-msg { flex: 1; }
.banner-close {
  background: transparent; border: none; cursor: pointer;
  color: inherit; opacity: .4; font-size: 12px; line-height: 1;
  padding: 2px 4px; border-radius: 3px; transition: opacity .15s;
}
.banner-close:hover { opacity: .8; }
.banner-done  { background: var(--green-bg); color: #047857; border: 1px solid #A7F3D0; }
.banner-error { background: var(--red-bg);   color: var(--red); border: 1px solid #FECACA; }

/* Empty */
.empty { text-align: center; padding: 54px 20px; color: var(--text-dim); }
.empty-icon { font-size: 32px; margin-bottom: 12px; }

/* Mobile */
@media (max-width: 600px) {
  .folder-table thead th:nth-child(2),
  .folder-table tbody td:nth-child(2),
  .folder-table thead th:nth-child(3),
  .folder-table tbody td:nth-child(3) { display: none; }
  header { padding: 0 14px; }
  main { padding: 14px 12px; }
  .exec-footer { flex-direction: column; align-items: flex-start; }
  .btn-execute { width: 100%; justify-content: center; }
  .logo-text, .logo-node { display: none; }
}
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-mark">S&amp;S</div>
    <div>
      <div class="logo-text">Salt &amp; Soil</div>
      <div class="logo-node" id="node-label">Orchestrator</div>
    </div>
  </div>
  <div style="display:flex;align-items:center;gap:8px">
    <div class="schedule-chip" id="schedule-chip" style="display:none">
      <span style="font-size:12px">⏰</span>
      <span id="schedule-chip-label"></span>
    </div>
    <div class="status-chip chip-idle" id="status-chip">
      <div class="chip-dot"></div>
      <span id="status-label">Idle</span>
    </div>
  </div>
</header>

<main>
  <div id="banner-area"></div>

  <div class="action-row">
    <button class="btn btn-primary" id="btn-scan" onclick="startScan()">▶ &nbsp;Start Scan</button>
  </div>
  <div class="progress-wrap" id="progress-wrap"><div class="progress-inner"></div></div>

  <div class="tab-bar">
    <button class="tab-btn active" id="tab-btn-folders" onclick="showTab('folders')">Folders</button>
    <button class="tab-btn" id="tab-btn-schedule" onclick="showTab('schedule')">Schedule</button>
    <button class="tab-btn" id="tab-btn-log" onclick="showTab('log')">Log</button>
    <button class="tab-btn" id="tab-btn-settings" onclick="showTab('settings')">Settings</button>
  </div>

  <div class="tab-panel active" id="tab-folders">
    <div id="folders-area"></div>
  </div>

  <div class="tab-panel" id="tab-schedule">
    <div class="card">
      <div class="card-head">
        <span class="card-title">Scheduled scan</span>
        <span id="sched-save-status" style="font-size:11px;color:var(--text-dim)"></span>
      </div>
      <form class="sched-form" id="sched-form" onsubmit="saveSchedule(event)">
        <div class="sched-row">
          <label class="sched-radio">
            <input type="radio" name="sched-mode" value="off" id="sched-mode-off" checked>
            No schedule
          </label>
          <label class="sched-radio">
            <input type="radio" name="sched-mode" value="on" id="sched-mode-on">
            Active
          </label>
        </div>
        <div class="sched-row">
          <span class="sched-label">Days</span>
          <div class="sched-presets">
            <button type="button" class="sched-preset-btn" data-preset="daily"    onclick="applyPreset('daily')">Daily</button>
            <button type="button" class="sched-preset-btn" data-preset="weekdays" onclick="applyPreset('weekdays')">Weekdays</button>
            <button type="button" class="sched-preset-btn" data-preset="weekend"  onclick="applyPreset('weekend')">Weekend</button>
            <button type="button" class="sched-preset-btn" data-preset="clear"    onclick="applyPreset('clear')">Clear</button>
          </div>
          <div class="sched-days" id="sched-days">
            <label class="sched-day-btn"><input type="checkbox" value="0">Mon</label>
            <label class="sched-day-btn"><input type="checkbox" value="1">Tue</label>
            <label class="sched-day-btn"><input type="checkbox" value="2">Wed</label>
            <label class="sched-day-btn"><input type="checkbox" value="3">Thu</label>
            <label class="sched-day-btn"><input type="checkbox" value="4">Fri</label>
            <label class="sched-day-btn"><input type="checkbox" value="5">Sat</label>
            <label class="sched-day-btn"><input type="checkbox" value="6">Sun</label>
          </div>
        </div>
        <div class="sched-row sched-time-row">
          <span class="sched-label">Time (24h)</span>
          <input type="time" class="sched-time" id="sched-time" value="03:00" required>
        </div>
        <div>
          <button type="submit" class="btn btn-primary">Save</button>
        </div>
      </form>
    </div>
  </div>

  <div class="tab-panel" id="tab-log">
    <div class="card">
      <div class="card-head">
        <span class="card-title">Log</span>
        <button class="btn btn-outline" style="padding:4px 10px;font-size:11px" onclick="clearLog()">Clear</button>
      </div>
      <div class="log-box" id="log-box"><span style="color:var(--text-dim)">Ready to start.</span></div>
    </div>
  </div>

  <div class="tab-panel" id="tab-settings">
    <div class="card">
      <div class="card-head">
        <span class="card-title">Account</span>
      </div>
      <div class="sched-form">
        <div class="sched-row">
          <span class="sched-label">Username</span>
          <input type="text" class="sched-time" style="width:240px;background:var(--bg)" value="{{ username }}" readonly>
        </div>
        <div>
          <form method="post" action="/logout" style="margin:0">
            <button type="submit" class="btn btn-outline">Log out</button>
          </form>
        </div>
      </div>
    </div>

    <div class="card">
      <div class="card-head">
        <span class="card-title">Change password</span>
        <span id="pwd-status" style="font-size:11px;color:var(--text-dim)"></span>
      </div>
      <form class="sched-form" id="pwd-form" onsubmit="changePassword(event)">
        <div class="sched-row">
          <span class="sched-label">Current password</span>
          <input type="password" class="sched-time" style="width:240px" id="pwd-current" autocomplete="current-password" required>
        </div>
        <div class="sched-row">
          <span class="sched-label">New password</span>
          <input type="password" class="sched-time" style="width:240px" id="pwd-new" minlength="8" autocomplete="new-password" required>
          <span style="font-size:11px;color:var(--text-dim)">At least 8 characters.</span>
        </div>
        <div class="sched-row">
          <span class="sched-label">Repeat new password</span>
          <input type="password" class="sched-time" style="width:240px" id="pwd-new2" minlength="8" autocomplete="new-password" required>
        </div>
        <div>
          <button type="submit" class="btn btn-primary">Update password</button>
        </div>
      </form>
    </div>
  </div>
</main>

<script>
// ── State ─────────────────────────────────────────────────────────────────────
let status    = 'idle';
let diffs     = [];
let actions   = {};   // key = "root|||name" → action string
let collapsed = {};   // key = sync_root → bool
let es        = null;
let syncInitiated = false;
let prevStatus    = null;
let lastSeenScanAt = null;

const LABELS = {
  idle:'Idle', mounting:'Mounting…', scanning:'Scanning…',
  ready:'Ready to sync', syncing:'Busy…',
  done:'Sync complete', error:'Error'
};

const DIFF_LABEL = {
  in_sync:'In sync', needs_sync:'Different',
  local_only:'Local only', remote_only:'Remote only', unknown:'Unknown'
};

const ACTION_OPTS = {
  in_sync:     [['skip','— Skip'],['delete_remote','✕ Delete']],
  needs_sync:  [['sync','↑ Sync'],['skip','— Skip'],['delete_remote','✕ Delete']],
  local_only:  [['sync','↑ Sync'],['skip','— Skip']],
  remote_only: [['skip','— Skip'],['pull','↓ Pull'],['delete_remote','✕ Delete']],
};

const DEFAULT_ACTION = {
  in_sync:'skip', needs_sync:'sync', local_only:'skip', remote_only:'skip'
};

function key(d) { return d.sync_root + '|||' + d.name; }
function rootId(root) { return 'root-icon-' + root.replace(/[^a-zA-Z0-9]/g, '_'); }
function esc(s) { return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

// ── Tabs ──────────────────────────────────────────────────────────────────────
function showTab(name) {
  ['folders','schedule','log','settings'].forEach(t => {
    document.getElementById('tab-' + t).classList.toggle('active', t === name);
    document.getElementById('tab-btn-' + t).classList.toggle('active', t === name);
  });
}

// ── Settings ──────────────────────────────────────────────────────────────────
async function changePassword(ev) {
  ev.preventDefault();
  const cur  = document.getElementById('pwd-current').value;
  const pw1  = document.getElementById('pwd-new').value;
  const pw2  = document.getElementById('pwd-new2').value;
  const stat = document.getElementById('pwd-status');
  if (pw1.length < 8)    { stat.textContent = 'Password must be at least 8 characters'; return; }
  if (pw1 !== pw2)       { stat.textContent = 'New passwords do not match'; return; }
  stat.textContent = 'Saving…';
  try {
    const r = await fetch('/api/settings/password', {
      method: 'POST', headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({current_password: cur, new_password: pw1, confirm_password: pw2}),
    });
    if (!r.ok) {
      let msg = 'Error';
      try { const j = await r.json(); msg = j.detail || msg; } catch {}
      stat.textContent = msg;
      return;
    }
    document.getElementById('pwd-form').reset();
    stat.textContent = 'Password updated ✓';
    setTimeout(() => { stat.textContent = ''; }, 2500);
  } catch {
    stat.textContent = 'Network error';
  }
}

// ── Schedule ──────────────────────────────────────────────────────────────────
const DAY_SHORT = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
const PRESETS   = {
  daily:    [0,1,2,3,4,5,6],
  weekdays: [0,1,2,3,4],
  weekend:  [5,6],
  clear:    [],
};

function applyPreset(name) {
  const days = PRESETS[name] || [];
  document.querySelectorAll('#sched-days input[type=checkbox]').forEach(cb => {
    cb.checked = days.includes(parseInt(cb.value, 10));
    cb.parentElement.classList.toggle('active', cb.checked);
  });
  updatePresetHighlights();
}

function currentSelectedDays() {
  return [...document.querySelectorAll('#sched-days input[type=checkbox]:checked')]
    .map(cb => parseInt(cb.value, 10));
}

function presetKey(days) {
  const sorted = [...days].sort((a,b)=>a-b).join(',');
  if (sorted === '0,1,2,3,4,5,6') return 'daily';
  if (sorted === '0,1,2,3,4')     return 'weekdays';
  if (sorted === '5,6')           return 'weekend';
  return null;
}

function presetLabel(days) {
  const key = presetKey(days);
  if (key === 'daily')    return 'Daily';
  if (key === 'weekdays') return 'Weekdays';
  if (key === 'weekend')  return 'Weekend';
  return null;
}

function updatePresetHighlights() {
  const active = presetKey(currentSelectedDays());
  document.querySelectorAll('.sched-preset-btn').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.preset === active);
  });
}

function applyScheduleToUI(s) {
  if (!s) return;
  document.getElementById('sched-mode-on').checked  = !!s.enabled;
  document.getElementById('sched-mode-off').checked = !s.enabled;
  document.querySelectorAll('#sched-days input[type=checkbox]').forEach(cb => {
    cb.checked = (s.days || []).includes(parseInt(cb.value, 10));
    cb.parentElement.classList.toggle('active', cb.checked);
  });
  const hh = String(s.hour  ?? 3).padStart(2, '0');
  const mm = String(s.minute ?? 0).padStart(2, '0');
  document.getElementById('sched-time').value = `${hh}:${mm}`;
  toggleScheduleFormDisabled();
  updatePresetHighlights();
  updateScheduleChip(s);
}

function toggleScheduleFormDisabled() {
  const on = document.getElementById('sched-mode-on').checked;
  document.getElementById('sched-form').classList.toggle('disabled', !on);
}

function updateScheduleChip(s) {
  const chip  = document.getElementById('schedule-chip');
  const label = document.getElementById('schedule-chip-label');
  if (!s || !s.enabled || !(s.days || []).length) {
    chip.style.display = 'none';
    return;
  }
  const hh = String(s.hour).padStart(2, '0');
  const mm = String(s.minute).padStart(2, '0');
  const preset = presetLabel(s.days);
  const days = preset || [...s.days].sort((a,b)=>a-b).map(d => DAY_SHORT[d]).join(' ');
  label.textContent = `${hh}:${mm} ${days}`;
  chip.style.display = 'inline-flex';
}

async function saveSchedule(ev) {
  ev.preventDefault();
  const enabled = document.getElementById('sched-mode-on').checked;
  const days = [...document.querySelectorAll('#sched-days input[type=checkbox]:checked')].map(cb => parseInt(cb.value, 10));
  const [hh, mm] = document.getElementById('sched-time').value.split(':').map(x => parseInt(x, 10));
  if (enabled && !days.length) {
    document.getElementById('sched-save-status').textContent = 'Select at least one day';
    return;
  }
  const payload = { enabled, days, hour: hh || 0, minute: mm || 0 };
  const status = document.getElementById('sched-save-status');
  status.textContent = 'Saving…';
  try {
    const r = await fetch('/api/schedule', {
      method: 'POST', headers: {'Content-Type': 'application/json'},
      body: JSON.stringify(payload),
    });
    if (!r.ok) { status.textContent = 'Error: ' + (await r.text()); return; }
    const saved = await r.json();
    applyScheduleToUI(saved);
    status.textContent = 'Saved ✓';
    setTimeout(() => { status.textContent = ''; }, 2500);
  } catch (e) {
    status.textContent = 'Network error';
  }
}

// ── SSE ───────────────────────────────────────────────────────────────────────
function connectSSE() {
  if (es) es.close();
  es = new EventSource('/api/stream');
  es.onmessage = ev => {
    const d = JSON.parse(ev.data);
    prevStatus = d.status;
    setStatus(d.status);
    appendLog(d.new_log || []);
    // Only reset user-chosen actions when a *new* scan has produced fresh
    // diffs — not on every SSE frame during sync. Detect via last_scan_at.
    if (d.diffs?.length) {
      const freshScan = d.last_scan_at && d.last_scan_at !== lastSeenScanAt;
      diffs = d.diffs;
      if (freshScan) {
        actions = {};
        lastSeenScanAt = d.last_scan_at;
      }
      renderFolders();
    }
    if (d.error)            showBanner('error', '⚠ ' + d.error);
    if (d.schedule)         updateScheduleChip(d.schedule);
    if (d.status === 'ready' && syncInitiated) {
      syncInitiated = false;
      if (d.cancelled) {
        showBanner('error', '✕ Sync cancelled — folder status refreshed');
      } else {
        showBanner('done', '✓ Sync complete — NAS devices can go to sleep now 🛌');
      }
      closeSse();
    }
    if (d.status === 'done')  { onDone(); closeSse(); }
    if (d.status === 'error') { closeSse(); }
  };
}
function closeSse() { if (es) { es.close(); es = null; } }

// ── Status ────────────────────────────────────────────────────────────────────
function setStatus(s) {
  status = s;
  const chip = document.getElementById('status-chip');
  chip.className = 'status-chip chip-' + s;
  document.getElementById('status-label').textContent = LABELS[s] || s;
  const btn = document.getElementById('btn-scan');
  const busy = ['mounting','scanning','syncing'].includes(s);
  btn.disabled = busy;
  btn.innerHTML = busy ? '⏳ &nbsp;Busy…' : '▶ &nbsp;Start Scan';
  document.getElementById('progress-wrap').classList.toggle('visible', ['mounting','scanning','syncing'].includes(s));
  document.querySelectorAll('.action-select').forEach(el => { el.disabled = busy; });
  updateExecuteButton();
}

function updateExecuteButton() {
  const btn = document.getElementById('btn-execute');
  if (!btn) return;
  const hasWork = Object.values(actions).some(a => a !== 'skip');
  btn.disabled = status !== 'ready' || !hasWork;
  const cancel = document.getElementById('btn-cancel');
  if (cancel) cancel.style.display = status === 'syncing' ? '' : 'none';
  if (status !== 'syncing') hideCancelConfirm();
}

// ── Log ───────────────────────────────────────────────────────────────────────
const LOG_CAP = 500;
function clearLog() {
  fetch('/api/log/clear', {method:'POST'}).catch(() => {});
  document.getElementById('log-box').innerHTML = '<span style="color:var(--text-dim)">Ready to start.</span>';
}
function appendLog(lines) {
  const box = document.getElementById('log-box');
  if (lines.length && box.querySelector('span')) box.innerHTML = '';
  lines.forEach(l => {
    const d = document.createElement('div'); d.textContent = l; box.insertBefore(d, box.firstChild);
  });
  while (box.children.length > LOG_CAP) box.removeChild(box.lastChild);
  box.scrollTop = 0;
}

// ── Scan ──────────────────────────────────────────────────────────────────────
function startScan() {
  document.getElementById('banner-area').innerHTML = '';
  actions = {};
  if (diffs.length) renderFolders();
  connectSSE();
  fetch('/api/start', {method:'POST'});
  setStatus('scanning');
}

// ── Collapsible root rows ─────────────────────────────────────────────────────
function toggleRoot(root) {
  collapsed[root] = !collapsed[root];
  const icon = document.getElementById(rootId(root));
  if (icon) icon.textContent = collapsed[root] ? '▶' : '▼';
  document.querySelectorAll(`[data-root="${root}"]`).forEach(tr => {
    tr.style.display = collapsed[root] ? 'none' : '';
  });
  const anyOpen = Object.values(collapsed).some(v => !v);
  const tbl = document.getElementById('folder-table');
  if (tbl) tbl.classList.toggle('cols-hidden', !anyOpen);
}

// ── Folder table ──────────────────────────────────────────────────────────────
function renderFolders() {
  diffs.forEach(d => { if (!(key(d) in actions)) actions[key(d)] = DEFAULT_ACTION[d.diff_status] || 'skip'; });

  const area = document.getElementById('folders-area');
  const grouped = {};
  diffs.forEach(d => { (grouped[d.sync_root] = grouped[d.sync_root] || []).push(d); });
  const roots = Object.keys(grouped);

  let html = `
    <div class="card" style="margin-bottom:12px;overflow:hidden">
      <table class="folder-table cols-hidden" id="folder-table">
        <thead><tr>
          <th>Folder</th><th>Local</th><th>Remote</th><th>Status</th><th>Action</th>
        </tr></thead>
        <tbody id="diff-tbody"></tbody>
      </table>
    </div>`;
  area.innerHTML = html;

  const tbody = document.getElementById('diff-tbody');
  roots.forEach(root => {
    if (!(root in collapsed)) collapsed[root] = true;  // default collapsed
    const isCollapsed = collapsed[root];
    const tr = document.createElement('tr');
    tr.className = 'root-row';
    tr.onclick = () => toggleRoot(root);
    tr.innerHTML = `<td colspan="5"><span class="root-icon" id="${rootId(root)}">${isCollapsed ? '▶' : '▼'}</span>/${root}</td>`;
    tbody.appendChild(tr);

    grouped[root].forEach(d => {
      const k    = key(d);
      const diff = d.local_size > 0 && d.remote_size > 0 &&
        Math.abs(d.local_size - d.remote_size) / Math.max(d.local_size, 1) > 0.01;
      const opts = (ACTION_OPTS[d.diff_status] || []).map(([v,l]) =>
        `<option value="${v}" ${actions[k]===v?'selected':''}>${l}</option>`).join('');
      const sc = actions[k]==='sync' ? 'sel-sync' : actions[k]==='pull' ? 'sel-pull' : actions[k]==='delete_remote' ? 'sel-delete' : 'sel-skip';
      const dataRow = document.createElement('tr');
      dataRow.setAttribute('data-root', root);
      if (isCollapsed) dataRow.style.display = 'none';
      dataRow.innerHTML = `
        <td class="fname">${esc(d.name)}</td>
        <td class="fsize ${diff?'fsize-diff':''}">${d.local_size > 0 ? d.local_size_hr : '—'}</td>
        <td class="fsize ${diff?'fsize-diff':''}">${d.remote_size > 0 ? d.remote_size_hr : '—'}</td>
        <td><span class="badge badge-${d.diff_status}">${DIFF_LABEL[d.diff_status]||d.diff_status}</span></td>
        <td><select class="action-select ${sc}" data-key="${esc(k)}" ${['mounting','scanning','syncing'].includes(status)?'disabled':''}
          onchange="setAction(this)">${opts}</select></td>`;
      tbody.appendChild(dataRow);
    });
  });

  const confirmBox = document.createElement('div');
  confirmBox.className = 'cancel-confirm'; confirmBox.id = 'cancel-confirm';
  confirmBox.innerHTML = `
    <span class="msg">Cancel the running sync? The current file transfer will stop, and a scan will run afterwards to refresh folder status.</span>
    <div class="actions">
      <button class="btn-sm btn-no"  onclick="hideCancelConfirm()">Keep syncing</button>
      <button class="btn-sm btn-yes" onclick="confirmCancel()">Yes, cancel</button>
    </div>`;
  area.appendChild(confirmBox);

  const footer = document.createElement('div');
  footer.className = 'exec-footer'; footer.id = 'exec-footer';
  footer.innerHTML = `
    <div class="exec-stats" id="exec-stats"></div>
    <div style="display:flex;gap:10px">
      <button class="btn btn-cancel" id="btn-cancel"
        onclick="doCancel()" style="display:none">
        ✕ &nbsp;Cancel
      </button>
      <button class="btn btn-execute" id="btn-execute"
        onclick="doExecute()" ${status!=='ready'?'disabled':''}>
        ↑ &nbsp;Execute
      </button>
    </div>`;
  area.appendChild(footer);
  updateStats();
}

function setAction(sel) {
  const k = sel.dataset.key;
  actions[k] = sel.value;
  sel.className = `action-select ${sel.value==='sync'?'sel-sync':sel.value==='pull'?'sel-pull':sel.value==='delete_remote'?'sel-delete':'sel-skip'}`;
  updateStats();
}

function updateStats() {
  const el = document.getElementById('exec-stats');
  if (!el) return;
  const vals = Object.values(actions);
  const s = vals.filter(a=>a==='sync').length;
  const p = vals.filter(a=>a==='pull').length;
  const d = vals.filter(a=>a==='delete_remote').length;
  const k = vals.filter(a=>a==='skip').length;
  el.innerHTML = `
    <div class="exec-stat"><span class="n n-sync">${s}</span> to sync</div>
    <div class="exec-stat"><span class="n n-pull">${p}</span> to pull</div>
    <div class="exec-stat"><span class="n n-del">${d}</span> to delete</div>
    <div class="exec-stat"><span class="n n-skip">${k}</span> to skip</div>`;
  updateExecuteButton();
}

// ── Execute ───────────────────────────────────────────────────────────────────
async function doExecute() {
  const payload = diffs.map(d => ({
    sync_root: d.sync_root, folder: d.name,
    action: actions[key(d)] || 'skip',
  }));
  setStatus('mounting');
  document.getElementById('btn-execute').disabled = true;
  // Await the POST so the server state is SYNCING before we open SSE — otherwise
  // the first SSE frame can arrive with the stale pre-execute status=ready and
  // instantly fire the "sync complete" banner.
  let r;
  try {
    r = await fetch('/api/execute', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({actions: payload}),
    });
  } catch {
    showBanner('error', '⚠ Network error starting sync');
    const s = await fetch('/api/state').then(x => x.json()).catch(() => null);
    if (s) setStatus(s.status);
    return;
  }
  if (!r.ok) {
    const msg = await r.text().catch(() => 'Execute failed');
    showBanner('error', '⚠ ' + msg);
    const s = await fetch('/api/state').then(x => x.json()).catch(() => null);
    if (s) setStatus(s.status);
    return;
  }
  syncInitiated = true;
  connectSSE();
}

function doCancel() {
  const box = document.getElementById('cancel-confirm');
  if (box) box.classList.add('visible');
}
function hideCancelConfirm() {
  const box = document.getElementById('cancel-confirm');
  if (box) box.classList.remove('visible');
}
function confirmCancel() {
  hideCancelConfirm();
  const btn = document.getElementById('btn-cancel');
  if (btn) btn.disabled = true;
  fetch('/api/cancel', {method:'POST'}).catch(() => {});
}

function onDone() {
  setStatus('done');
  showBanner('done', '✓ Sync complete — NAS devices can go to sleep now 🛌');
}

function showBanner(type, msg) {
  document.getElementById('banner-area').innerHTML =
    `<div class="banner banner-${type}">
       <span class="banner-msg">${msg}</span>
       <button class="banner-close" onclick="this.parentElement.remove()" aria-label="Dismiss">✕</button>
     </div>`;
}

// ── Schedule form wiring ──────────────────────────────────────────────────────
document.querySelectorAll('input[name="sched-mode"]').forEach(r =>
  r.addEventListener('change', toggleScheduleFormDisabled));
document.querySelectorAll('#sched-days input[type=checkbox]').forEach(cb =>
  cb.addEventListener('change', () => {
    cb.parentElement.classList.toggle('active', cb.checked);
    updatePresetHighlights();
  }));

// ── Init ──────────────────────────────────────────────────────────────────────
fetch('/api/state').then(r=>r.json()).then(d => {
  setStatus(d.status);
  if (d.log?.length)      appendLog(d.log);
  if (d.diffs?.length)    { diffs = d.diffs; renderFolders(); }
  if (d.last_scan_at)     lastSeenScanAt = d.last_scan_at;
  if (d.error)            showBanner('error', '⚠ ' + d.error);
  if (d.schedule)         applyScheduleToUI(d.schedule);
  if (d.status === 'done') onDone();
  if (['mounting','scanning','syncing'].includes(d.status)) connectSSE();
});
</script>
</body>
</html>
