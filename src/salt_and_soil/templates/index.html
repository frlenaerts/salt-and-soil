<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Salt &amp; Soil</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,400&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --teal:        #1ABFBA;
  --teal-dark:   #139E9A;
  --teal-light:  #E8F8F8;
  --teal-mid:    #A8E8E7;
  --bg:          #F4F6F8;
  --surface:     #FFFFFF;
  --border:      #E2E7EE;
  --border-mid:  #C8D0DB;
  --text:        #18222E;
  --text-mid:    #475467;
  --text-dim:    #8898AA;
  --amber:       #F59E0B;
  --amber-bg:    #FFFBEB;
  --red:         #EF4444;
  --red-bg:      #FFF2F2;
  --green:       #10B981;
  --green-bg:    #EDFCF5;
  --blue:        #3B82F6;
  --blue-bg:     #EFF6FF;
  --sans:        'DM Sans', sans-serif;
  --mono:        'DM Mono', monospace;
  --r:           10px;
  --shadow:      0 1px 4px rgba(0,0,0,.06), 0 2px 12px rgba(0,0,0,.04);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg); color: var(--text); font-family: var(--sans); font-size: 14px; min-height: 100vh; }

/* ── Header ── */
header {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 0 24px;
  height: 58px;
  display: flex; align-items: center; justify-content: space-between;
  position: sticky; top: 0; z-index: 30;
  box-shadow: 0 1px 3px rgba(0,0,0,.05);
}
.logo { display: flex; align-items: center; gap: 10px; }
.logo-mark {
  width: 34px; height: 34px;
  background: var(--teal);
  border-radius: 9px;
  display: flex; align-items: center; justify-content: center;
  font-weight: 700; font-size: 13px; color: #fff; letter-spacing: -.5px;
}
.logo-text { font-weight: 600; font-size: 16px; letter-spacing: -.3px; }
.logo-node { font-size: 11px; color: var(--text-dim); margin-top: 1px; }

.status-chip {
  display: flex; align-items: center; gap: 6px;
  padding: 5px 12px; border-radius: 20px;
  font-size: 12px; font-weight: 500;
}
.chip-dot { width: 6px; height: 6px; border-radius: 50%; }
.chip-idle    { background: #F0F2F5; color: var(--text-dim); }
.chip-idle    .chip-dot { background: var(--text-dim); }
.chip-mounting,.chip-scanning { background: var(--blue-bg); color: var(--blue); }
.chip-mounting .chip-dot,.chip-scanning .chip-dot { background: var(--blue); animation: blink 1s infinite; }
.chip-ready   { background: var(--teal-light); color: var(--teal-dark); }
.chip-ready   .chip-dot { background: var(--teal); }
.chip-syncing { background: var(--amber-bg); color: #92400E; }
.chip-syncing .chip-dot { background: var(--amber); animation: blink 1s infinite; }
.chip-done    { background: var(--green-bg); color: #065F46; }
.chip-done    .chip-dot { background: var(--green); }
.chip-error   { background: var(--red-bg); color: var(--red); }
.chip-error   .chip-dot { background: var(--red); }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:.25} }

/* ── Layout ── */
main { max-width: 980px; margin: 0 auto; padding: 24px 20px; }

/* ── Cards ── */
.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r);
  box-shadow: var(--shadow);
  margin-bottom: 16px;
}
.card-head {
  padding: 12px 18px;
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
}
.card-title {
  font-size: 11px; font-weight: 600;
  text-transform: uppercase; letter-spacing: .8px;
  color: var(--text-dim);
}

/* ── Buttons ── */
.btn {
  display: inline-flex; align-items: center; gap: 6px;
  font-family: var(--sans); font-size: 13px; font-weight: 500;
  padding: 9px 18px; border-radius: 8px; border: none;
  cursor: pointer; transition: all .15s; white-space: nowrap; line-height: 1;
}
.btn:active { transform: scale(.97); }
.btn:disabled { opacity: .35; cursor: not-allowed; transform: none; }

.btn-primary  { background: var(--teal); color: #fff; }
.btn-primary:hover:not(:disabled) { background: var(--teal-dark); }
.btn-outline  { background: transparent; border: 1px solid var(--border-mid); color: var(--text-mid); }
.btn-outline:hover:not(:disabled) { border-color: var(--teal); color: var(--teal); background: var(--teal-light); }
.btn-execute  { background: var(--teal); color: #fff; font-size: 14px; font-weight: 600; padding: 11px 26px; }
.btn-execute:hover:not(:disabled) { background: var(--teal-dark); }

/* ── Action row ── */
.action-row { display: flex; gap: 8px; margin-bottom: 12px; flex-wrap: wrap; }

/* ── Progress bar ── */
.progress-wrap {
  height: 4px; background: var(--border); border-radius: 2px;
  margin-bottom: 20px; overflow: hidden; display: none;
}
.progress-wrap.visible { display: block; }
.progress-inner {
  height: 100%; width: 35%; background: var(--teal); border-radius: 2px;
  animation: prog 1.4s ease-in-out infinite;
}
@keyframes prog { 0%{transform:translateX(-100%)} 100%{transform:translateX(380%)} }

/* ── Info strip (always-visible, sticky below header) ── */
.info-strip { position: sticky; top: 58px; z-index: 29; background: var(--bg); }
.info-strip-inner { max-width: 980px; margin: 0 auto; padding: 10px 20px; }
.info-bar {
  display: flex; align-items: center; justify-content: space-between; gap: 14px;
  padding: 10px 18px;
  background: var(--teal-light);
  border: 1px solid var(--teal-mid);
  border-radius: var(--r);
  font-size: 12px; color: var(--teal-dark);
}
.info-bar strong { font-weight: 600; }
.info-bar .last-scan { color: var(--text-dim); white-space: nowrap; }

/* ── Tabs ── */
.tab-bar {
  display: flex; gap: 2px;
  border-bottom: 1px solid var(--border);
  margin-bottom: 16px;
}
.tab-btn {
  font-family: var(--sans); font-size: 13px; font-weight: 500;
  padding: 9px 18px; border: none; background: transparent;
  color: var(--text-dim); cursor: pointer;
  border-bottom: 2px solid transparent; margin-bottom: -1px;
  transition: color .15s, border-color .15s;
}
.tab-btn:hover { color: var(--text); }
.tab-btn.active { color: var(--teal-dark); border-bottom-color: var(--teal); }
.tab-panel { display: none; }
.tab-panel.active { display: block; }

/* ── Table ── */
.folder-table { width: 100%; border-collapse: collapse; }
.folder-table.cols-hidden th:not(:first-child) { display: none; }
.folder-table thead th {
  text-align: left; font-size: 11px; font-weight: 600;
  text-transform: uppercase; letter-spacing: .7px;
  color: var(--text-dim); padding: 10px 16px;
  background: var(--bg); border-bottom: 1px solid var(--border);
}
.folder-table tbody td { padding: 11px 16px; border-bottom: 1px solid var(--border); vertical-align: middle; }
.folder-table tbody tr:last-child td { border-bottom: none; }
.folder-table tbody tr:hover td { background: #FAFBFC; }

.root-row td {
  background: var(--teal-light) !important;
  color: var(--teal-dark);
  font-size: 11px; font-weight: 600;
  text-transform: uppercase; letter-spacing: .7px;
  padding: 7px 16px;
  border-bottom: 1px solid var(--teal-mid);
  cursor: pointer;
  user-select: none;
}
.root-row:hover td { background: #d4f0f0 !important; }
.root-icon { margin-right: 6px; font-style: normal; font-size: 10px; }

.fname { font-family: var(--mono); font-size: 13px; font-weight: 500; }
.fsize { font-family: var(--mono); font-size: 12px; color: var(--text-mid); }
.fsize-diff { color: var(--amber); font-weight: 500; }

/* Badges */
.badge {
  display: inline-flex; align-items: center;
  font-size: 11px; font-weight: 600;
  padding: 2px 8px; border-radius: 4px; white-space: nowrap;
}
.badge-in_sync     { background: var(--green-bg);  color: #047857; }
.badge-needs_sync  { background: var(--amber-bg);  color: #92400E; }
.badge-local_only  { background: var(--blue-bg);   color: #1D4ED8; }
.badge-remote_only { background: var(--red-bg);    color: #B91C1C; }
.badge-unknown     { background: #F0F2F5;           color: var(--text-dim); }

/* Action select */
.action-select {
  font-family: var(--sans); font-size: 12px; font-weight: 500;
  background: var(--bg); border: 1px solid var(--border-mid);
  color: var(--text); padding: 6px 10px; border-radius: 6px;
  cursor: pointer; min-width: 148px; transition: border-color .15s;
}
.action-select:focus { outline: none; border-color: var(--teal); box-shadow: 0 0 0 3px rgba(26,191,186,.12); }
.sel-sync   { border-color: var(--teal);  background: var(--teal-light);  color: var(--teal-dark); }
.sel-delete { border-color: var(--red);   background: var(--red-bg);      color: var(--red); }
.sel-skip   { color: var(--text-dim); }

/* Execute footer */
.exec-footer {
  display: flex; align-items: center; justify-content: space-between;
  gap: 14px; padding: 14px 18px;
  border: 1px solid var(--border); border-radius: var(--r);
  background: var(--surface); box-shadow: var(--shadow);
  flex-wrap: wrap;
}
.exec-stats { display: flex; gap: 18px; flex-wrap: wrap; }
.exec-stat { display: flex; align-items: baseline; gap: 5px; font-size: 12px; color: var(--text-mid); }
.exec-stat .n { font-family: var(--mono); font-size: 15px; font-weight: 600; }
.n-sync { color: var(--teal); }
.n-del  { color: var(--red); }
.n-skip { color: var(--text-dim); }

/* Log */
.log-box {
  font-family: var(--mono); font-size: 12px; line-height: 1.85;
  padding: 14px 16px; max-height: 420px; overflow-y: auto;
  background: var(--bg); border-radius: 0 0 var(--r) var(--r);
  color: var(--text-mid);
}
.log-box::-webkit-scrollbar { width: 4px; }
.log-box::-webkit-scrollbar-thumb { background: var(--border-mid); border-radius: 2px; }

/* Banners */
.banner {
  display: flex; align-items: center; gap: 8px;
  padding: 12px 16px; border-radius: var(--r);
  font-size: 14px; font-weight: 500; margin-bottom: 14px;
}
.banner-done  { background: var(--green-bg); color: #047857; border: 1px solid #A7F3D0; }
.banner-error { background: var(--red-bg);   color: var(--red); border: 1px solid #FECACA; }

/* Empty */
.empty { text-align: center; padding: 54px 20px; color: var(--text-dim); }
.empty-icon { font-size: 32px; margin-bottom: 12px; }

/* Mobile */
@media (max-width: 600px) {
  .folder-table thead th:nth-child(3),
  .folder-table tbody td:nth-child(3) { display: none; }
  header { padding: 0 14px; }
  main { padding: 14px 12px; }
  .exec-footer { flex-direction: column; align-items: flex-start; }
  .btn-execute { width: 100%; justify-content: center; }
}
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-mark">S&amp;S</div>
    <div>
      <div class="logo-text">Salt &amp; Soil</div>
      <div class="logo-node" id="node-label">Orchestrator</div>
    </div>
  </div>
  <div class="status-chip chip-idle" id="status-chip">
    <div class="chip-dot"></div>
    <span id="status-label">Idle</span>
  </div>
</header>

<div class="info-strip">
  <div class="info-strip-inner">
    <div class="info-bar">
      <strong>{{ nas_source }}</strong>
      <div class="last-scan" id="last-scan-label"></div>
    </div>
  </div>
</div>

<main>
  <div id="banner-area"></div>

  <div class="action-row">
    <button class="btn btn-primary" id="btn-scan" onclick="startScan()">▶ &nbsp;Start Scan</button>
  </div>
  <div class="progress-wrap" id="progress-wrap"><div class="progress-inner"></div></div>

  <div class="tab-bar">
    <button class="tab-btn active" id="tab-btn-folders" onclick="showTab('folders')">Folders</button>
    <button class="tab-btn" id="tab-btn-log" onclick="showTab('log')">Log</button>
  </div>

  <div class="tab-panel active" id="tab-folders">
    <div id="folders-area"></div>
  </div>

  <div class="tab-panel" id="tab-log">
    <div class="card">
      <div class="card-head">
        <span class="card-title">Log</span>
        <button class="btn btn-outline" style="padding:4px 10px;font-size:11px" onclick="document.getElementById('log-box').innerHTML=''">Clear</button>
      </div>
      <div class="log-box" id="log-box"><span style="color:var(--text-dim)">Ready to start.</span></div>
    </div>
  </div>
</main>

<script>
// ── State ─────────────────────────────────────────────────────────────────────
let status    = 'idle';
let diffs     = [];
let actions   = {};   // key = "root|||name" → action string
let collapsed = {};   // key = sync_root → bool
let es        = null;

const LABELS = {
  idle:'Idle', mounting:'Mounting…', scanning:'Scanning…',
  ready:'Ready to sync', syncing:'Busy…',
  done:'Sync complete', error:'Error'
};

const DIFF_LABEL = {
  in_sync:'In sync', needs_sync:'Different',
  local_only:'Local only', remote_only:'Remote only', unknown:'Unknown'
};

const ACTION_OPTS = {
  in_sync:     [['skip','— skip'],['sync','↑ Re-sync'],['delete_remote','✕ Delete remote']],
  needs_sync:  [['sync','↑ Sync'],['skip','— skip'],['delete_remote','✕ Delete remote']],
  local_only:  [['sync','↑ Sync to agent'],['skip','— skip']],
  remote_only: [['skip','— skip'],['delete_remote','✕ Delete remote']],
};

const DEFAULT_ACTION = {
  in_sync:'skip', needs_sync:'skip', local_only:'skip', remote_only:'skip'
};

function key(d) { return d.sync_root + '|||' + d.name; }
function rootId(root) { return 'root-icon-' + root.replace(/[^a-zA-Z0-9]/g, '_'); }

// ── Tabs ──────────────────────────────────────────────────────────────────────
function showTab(name) {
  ['folders','log'].forEach(t => {
    document.getElementById('tab-' + t).classList.toggle('active', t === name);
    document.getElementById('tab-btn-' + t).classList.toggle('active', t === name);
  });
}

// ── SSE ───────────────────────────────────────────────────────────────────────
function connectSSE() {
  if (es) es.close();
  es = new EventSource('/api/stream');
  es.onmessage = ev => {
    const d = JSON.parse(ev.data);
    setStatus(d.status);
    appendLog(d.new_log || []);
    if (d.diffs?.length)    { diffs = d.diffs; renderFolders(); }
    if (d.last_scan_at)     updateLastScan(d.last_scan_at);
    if (d.error)            showBanner('error', '⚠ ' + d.error);
    if (d.status === 'done')  { onDone(); closeSse(); }
    if (d.status === 'error') { closeSse(); }
  };
}
function closeSse() { if (es) { es.close(); es = null; } }

// ── Status ────────────────────────────────────────────────────────────────────
function setStatus(s) {
  status = s;
  const chip = document.getElementById('status-chip');
  chip.className = 'status-chip chip-' + s;
  document.getElementById('status-label').textContent = LABELS[s] || s;
  const btn = document.getElementById('btn-scan');
  const busy = ['mounting','scanning','syncing'].includes(s);
  btn.disabled = busy;
  btn.innerHTML = busy ? '⏳ &nbsp;Busy…' : '▶ &nbsp;Start Scan';
  document.getElementById('progress-wrap').classList.toggle('visible', ['mounting','scanning'].includes(s));
}

// ── Log ───────────────────────────────────────────────────────────────────────
function appendLog(lines) {
  const box = document.getElementById('log-box');
  if (lines.length && box.querySelector('span')) box.innerHTML = '';
  lines.forEach(l => {
    const d = document.createElement('div'); d.textContent = l; box.appendChild(d);
  });
  box.scrollTop = box.scrollHeight;
}

// ── Last scan timestamp ───────────────────────────────────────────────────────
function updateLastScan(iso) {
  if (!iso) return;
  const d = new Date(iso);
  const pad = n => String(n).padStart(2, '0');
  const fmt = `${pad(d.getDate())}/${pad(d.getMonth()+1)}/${d.getFullYear()} ${pad(d.getHours())}:${pad(d.getMinutes())}`;
  document.getElementById('last-scan-label').textContent = 'Last scan: ' + fmt;
}

// ── Scan ──────────────────────────────────────────────────────────────────────
function startScan() {
  document.getElementById('banner-area').innerHTML = '';
  document.getElementById('folders-area').innerHTML = '';
  document.getElementById('log-box').innerHTML = '';
  diffs = []; actions = {}; collapsed = {};
  connectSSE();
  fetch('/api/start', {method:'POST'});
  setStatus('scanning');
}

// ── Collapsible root rows ─────────────────────────────────────────────────────
function toggleRoot(root) {
  collapsed[root] = !collapsed[root];
  const icon = document.getElementById(rootId(root));
  if (icon) icon.textContent = collapsed[root] ? '▶' : '▼';
  document.querySelectorAll(`[data-root="${root}"]`).forEach(tr => {
    tr.style.display = collapsed[root] ? 'none' : '';
  });
  const anyOpen = Object.values(collapsed).some(v => !v);
  const tbl = document.getElementById('folder-table');
  if (tbl) tbl.classList.toggle('cols-hidden', !anyOpen);
}

// ── Folder table ──────────────────────────────────────────────────────────────
function renderFolders() {
  diffs.forEach(d => { if (!(key(d) in actions)) actions[key(d)] = DEFAULT_ACTION[d.diff_status] || 'skip'; });

  const area = document.getElementById('folders-area');
  const grouped = {};
  diffs.forEach(d => { (grouped[d.sync_root] = grouped[d.sync_root] || []).push(d); });
  const roots = Object.keys(grouped);

  let html = `
    <div class="card" style="margin-bottom:12px;overflow:hidden">
      <table class="folder-table cols-hidden" id="folder-table">
        <thead><tr>
          <th>Folder</th><th>Local</th><th>Remote</th><th>Status</th><th>Action</th>
        </tr></thead>
        <tbody id="diff-tbody"></tbody>
      </table>
    </div>`;
  area.innerHTML = html;

  const tbody = document.getElementById('diff-tbody');
  roots.forEach(root => {
    if (!(root in collapsed)) collapsed[root] = true;  // default collapsed
    const isCollapsed = collapsed[root];
    const tr = document.createElement('tr');
    tr.className = 'root-row';
    tr.onclick = () => toggleRoot(root);
    tr.innerHTML = `<td colspan="5"><span class="root-icon" id="${rootId(root)}">${isCollapsed ? '▶' : '▼'}</span>/${root}</td>`;
    tbody.appendChild(tr);

    grouped[root].forEach(d => {
      const k    = key(d);
      const diff = d.local_size > 0 && d.remote_size > 0 &&
        Math.abs(d.local_size - d.remote_size) / Math.max(d.local_size, 1) > 0.01;
      const opts = (ACTION_OPTS[d.diff_status] || []).map(([v,l]) =>
        `<option value="${v}" ${actions[k]===v?'selected':''}>${l}</option>`).join('');
      const sc = actions[k]==='sync' ? 'sel-sync' : actions[k]==='delete_remote' ? 'sel-delete' : 'sel-skip';
      const dataRow = document.createElement('tr');
      dataRow.setAttribute('data-root', root);
      if (isCollapsed) dataRow.style.display = 'none';
      dataRow.innerHTML = `
        <td class="fname">${d.name}</td>
        <td class="fsize ${diff?'fsize-diff':''}">${d.local_size > 0 ? d.local_size_hr : '—'}</td>
        <td class="fsize ${diff?'fsize-diff':''}">${d.remote_size > 0 ? d.remote_size_hr : '—'}</td>
        <td><span class="badge badge-${d.diff_status}">${DIFF_LABEL[d.diff_status]||d.diff_status}</span></td>
        <td><select class="action-select ${sc}"
          onchange="setAction('${k}',this)">${opts}</select></td>`;
      tbody.appendChild(dataRow);
    });
  });

  const footer = document.createElement('div');
  footer.className = 'exec-footer'; footer.id = 'exec-footer';
  footer.innerHTML = `
    <div class="exec-stats" id="exec-stats"></div>
    <button class="btn btn-execute" id="btn-execute"
      onclick="doExecute()" ${status!=='ready'?'disabled':''}>
      ↑ &nbsp;Execute
    </button>`;
  area.appendChild(footer);
  updateStats();
}

function setAction(k, sel) {
  actions[k] = sel.value;
  sel.className = `action-select ${sel.value==='sync'?'sel-sync':sel.value==='delete_remote'?'sel-delete':'sel-skip'}`;
  updateStats();
}

function updateStats() {
  const el = document.getElementById('exec-stats');
  if (!el) return;
  const vals = Object.values(actions);
  const s = vals.filter(a=>a==='sync').length;
  const d = vals.filter(a=>a==='delete_remote').length;
  const k = vals.filter(a=>a==='skip').length;
  el.innerHTML = `
    <div class="exec-stat"><span class="n n-sync">${s}</span> to sync</div>
    <div class="exec-stat"><span class="n n-del">${d}</span> to delete</div>
    <div class="exec-stat"><span class="n n-skip">${k}</span> skipped</div>`;
}

// ── Execute ───────────────────────────────────────────────────────────────────
function doExecute() {
  const payload = diffs.map(d => ({
    sync_root: d.sync_root, folder: d.name,
    action: actions[key(d)] || 'skip',
  }));
  fetch('/api/execute', {
    method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({actions: payload}),
  });
  setStatus('syncing');
  document.getElementById('btn-execute').disabled = true;
}

function onDone() {
  showBanner('done', '✓ Sync complete — NAS devices are sleeping 🛌');
  setStatus('done');
}

function showBanner(type, msg) {
  document.getElementById('banner-area').innerHTML =
    `<div class="banner banner-${type}">${msg}</div>`;
}

// ── Init ──────────────────────────────────────────────────────────────────────
fetch('/api/state').then(r=>r.json()).then(d => {
  setStatus(d.status);
  if (d.log?.length)      appendLog(d.log);
  if (d.diffs?.length)    { diffs = d.diffs; renderFolders(); }
  if (d.last_scan_at)     updateLastScan(d.last_scan_at);
  if (d.error)            showBanner('error', '⚠ ' + d.error);
  if (d.status === 'done') onDone();
  if (['mounting','scanning','syncing'].includes(d.status)) connectSSE();
});
</script>
</body>
</html>
