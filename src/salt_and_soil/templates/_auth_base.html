<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{ title }} — Salt &amp; Soil</title>
<link rel="icon" type="image/png" sizes="32x32" href="/static/favicon-32x32.png">
<link rel="icon" type="image/png" sizes="16x16" href="/static/favicon-16x16.png">
<link rel="apple-touch-icon" href="/static/apple-touch-icon.png">
<link rel="manifest" href="/static/site.webmanifest">
<meta name="theme-color" content="#1ABFBA">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,400&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --teal:       #1ABFBA;
  --teal-dark:  #139E9A;
  --teal-light: #E8F8F8;
  --bg:         #F4F6F8;
  --surface:    #FFFFFF;
  --border:     #E2E7EE;
  --border-mid: #C8D0DB;
  --text:       #18222E;
  --text-mid:   #475467;
  --text-dim:   #8898AA;
  --red:        #EF4444;
  --red-bg:     #FFF2F2;
  --shadow:     0 1px 4px rgba(0,0,0,.06), 0 2px 12px rgba(0,0,0,.04);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  height: 100vh;
  height: 100dvh;
  overflow: hidden;
  overscroll-behavior: none;
}
body {
  background: var(--bg); color: var(--text);
  font-family: 'DM Sans', sans-serif; font-size: 14px;
  display: flex; align-items: center; justify-content: center;
  padding: 20px;
}
.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  box-shadow: var(--shadow);
  width: 100%; max-width: 380px;
  padding: 28px 30px 30px;
}
.brand {
  display: flex; align-items: center; gap: 10px;
  margin-bottom: 20px;
}
.logo-mark {
  width: 34px; height: 34px; border-radius: 9px;
  display: flex; align-items: center; justify-content: center;
  overflow: hidden;
}
.logo-mark img { width: 100%; height: 100%; object-fit: contain; }
.logo-text { font-weight: 600; font-size: 16px; }
h1 { font-size: 18px; font-weight: 600; margin-bottom: 4px; }
.sub { color: var(--text-dim); font-size: 13px; margin-bottom: 20px; }
form { display: flex; flex-direction: column; gap: 14px; }
label { display: flex; flex-direction: column; gap: 6px; }
.lbl { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: .7px; color: var(--text-dim); }
input[type=text], input[type=password] {
  font-family: inherit; font-size: 14px;
  padding: 9px 12px;
  border: 1px solid var(--border-mid); border-radius: 8px;
  background: #fff; color: var(--text);
}
input[type=text]:focus, input[type=password]:focus {
  outline: none; border-color: var(--teal); box-shadow: 0 0 0 3px rgba(26,191,186,.15);
}
.remember { display: flex; flex-direction: row; align-items: center; gap: 8px; font-size: 13px; color: var(--text-mid); }
.remember input { accent-color: var(--teal); }
button.submit {
  font-family: inherit; font-size: 14px; font-weight: 600;
  padding: 10px 18px; border-radius: 8px; border: none;
  background: var(--teal); color: #fff; cursor: pointer;
  transition: background .15s;
}
button.submit:hover { background: var(--teal-dark); }
.error {
  background: var(--red-bg); color: var(--red);
  border: 1px solid #FECACA; border-radius: 8px;
  padding: 10px 12px; font-size: 13px; margin-bottom: 6px;
}
.hint { color: var(--text-dim); font-size: 12px; }
</style>
</head>
<body>
<div class="card">
  <div class="brand">
    <div class="logo-mark"><img src="/static/logo_124x124.png" alt="Salt &amp; Soil"></div>
    <div class="logo-text">Salt &amp; Soil</div>
  </div>
  {% block content %}{% endblock %}
</div>
</body>
</html>
